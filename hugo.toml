baseURL = 'https://newmo.tech/'
title = '新墨韬'
theme = 'PaperUI'
defaultContentLanguage = 'zh-cn'
enableRobotsTXT = true
enableEmoji = true

[outputs]
home = ['HTML', 'RSS', 'JSON']

[params]
env = 'production'
description = '新墨韬 - 个人技术博客'
keywords = ['博客', 'Hugo', 'PaperMod', '技术']
defaultTheme = 'auto'
disableThemeToggle = false
disableScrollToTop = false
ShowReadingTime = true
ShowWordCount = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
ShowCodeCopyButtons = true
ShowToc = true
ShowPageNums = true
ShowRssButtonInSectionTermList = true
ShowAllPagesInArchive = false
ShowFullTextinRSS = false
homePostCount = 8

[params.homeInfoParams]
Title = '欢迎来到新墨韬'
Content = '这里是一个技术博客，分享编程、开源和生活中的思考。'

[params.homeCarousel]
slides = [
  { image = '/images/hero-1.jpg', url = '/posts/getting-started/' },
  { image = '/images/hero-2.jpg', url = '/posts/hello-world/' },
  { image = '/images/hero-3.jpg', url = '/posts/git-guide/' },
]
middle = [
  { image = '/images/square-1.jpg', url = '/posts/python-tips/' },
  { image = '/images/square-2.jpg', url = '/posts/linux-commands/' },
]
right = { image = '/images/portrait-1.jpg', url = '/about/' }

[params.assets]
favicon = '/favicon.svg'
favicon16x16 = '/favicon.svg'
favicon32x32 = '/favicon.svg'

[params.footer]
hideCopyright = false

[languages.zh-cn]
locale = 'zh-CN'
label = '中文'
title = '新墨韬'
weight = 1

[[languages.zh-cn.menu.main]]
name = '首页'
url = '/'
weight = 1

[[languages.zh-cn.menu.main]]
name = '文章'
url = '/posts/'
weight = 2

[[languages.zh-cn.menu.main]]
name = '分类'
url = '/categories/'
weight = 3

[[languages.zh-cn.menu.main]]
name = '归档'
url = '/archives/'
weight = 4

[[languages.zh-cn.menu.main]]
name = '关于'
url = '/about/'
weight = 5
