baseURL = 'https://example.org/'
locale = 'zh-CN'
title = '我的新 Hugo 网站'
theme = "PaperMod"
paginate = 10
mainSections = ["posts"]
defaultContentLanguage = "zh-CN"

[params]
paginator_pages = 10
recentLimit = 5
tagslimit = 15
archive_dropdown = "false"

[params.widgets]
display = true
mobile = true
widgets = ["search", "recent", "category", "tags", "archive"]

