  <script>
    function setDarkModeIcons(isDark) {
      var moonIcon1 = document.getElementById("icon-moon");
      var sunIcon1 = document.getElementById("icon-sun");
      var moonIcon2 = document.getElementById("icon2-moon");
      var sunIcon2 = document.getElementById("icon2-sun");
      if (moonIcon1) moonIcon1.classList.toggle("hidden", isDark);
      if (sunIcon1) sunIcon1.classList.toggle("hidden", !isDark);
      if (moonIcon2) moonIcon2.classList.toggle("hidden", isDark);
      if (sunIcon2) sunIcon2.classList.toggle("hidden", !isDark);
    }
    
    if (
      document.documentElement.classList.contains("dark") ||
      localStorage.theme === "dark" ||
      (!("theme" in localStorage) &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      setDarkModeIcons(true);
      document.documentElement.classList.add("dark");
    } else {
      setDarkModeIcons(false);
      document.documentElement.classList.remove("dark");
    }
    function toggleDarkMode() {
      if (document.documentElement.classList.contains("dark")) {
        setDarkModeIcons(false);
        document.documentElement.classList.remove("dark");
        localStorage.theme = "light";
      } else {
        setDarkModeIcons(true);
        document.documentElement.classList.add("dark");
        localStorage.theme = "dark";
      }
    }
  </script>
